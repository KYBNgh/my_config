set -g mouse on
set -g history-limit 100000
set -g status-style "bg=cyan, fg=black"

set -g window-status-style "bg=cyan, fg=black"

set -g status-left-style "bg=cyan, fg=black"
set -g status-right-style "bg=cyan, fg=black"

set-option -g status-right "%Y-%m-%d %H:%M:%S #(whoami)@#h "

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g pane-active-border-style "fg=cyan"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

